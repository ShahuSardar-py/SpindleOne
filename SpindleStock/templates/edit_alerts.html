{% extends "base.html" %}

{% block title %}Edit Stock Alert{% endblock %}

{% block extra_styles %}
{% include "stock_styles.html" %}
{% endblock %}

{% block content %}
<div class="stk-main flex items-center justify-center min-h-[calc(100vh-140px)]">

    <!-- Form Card -->
    <div class="stk-card w-full max-w-md">
        <h5 class="stk-card-title">Edit Stock Alert</h5>

        <form method="POST" class="space-y-6">

            <!-- Raw Material -->
            <div class="stk-field">
                <label>Raw Material</label>
                <select name="material_id" class="stk-select">
                    {% for m in materials %}
                    <option value="{{ m.id }}">{{ m.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Alert Quantity -->
            <div class="stk-field">
                <label>Alert Threshold Quantity</label>
                <input type="number" step="0.1" name="alert_quantity" required placeholder="25.0" class="stk-input">
            </div>

            <!-- Unit -->
            <div class="stk-field">
                <label>Unit</label>
                <select name="unit" class="stk-select">
                    <option value="kg">kg</option>
                    <option value="ton">ton</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4 border-t">
                <a href="{{ url_for('spindlestock.dashboard') }}" class="stk-btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="stk-btn-primary">
                    Save Alert Level
                </button>
            </div>

        </form>
    </div>

</div>
{% endblock %}
