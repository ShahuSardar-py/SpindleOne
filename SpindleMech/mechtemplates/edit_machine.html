{% extends "mech_base.html" %}
{% block title %}SpindleMech – Edit Machine{% endblock %}

{% block mech_content %}
<div style="max-width: 600px; margin: 0 auto;">

  <!-- Breadcrumb -->
  <nav style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase;">
    <a href="{{ url_for('spindlemech.index') }}" style="color: var(--sys-muted); text-decoration: none;">SpindleMech</a>
    <span style="color: var(--sys-border);">/</span>
    <a href="{{ url_for('spindlemech.machine_detail', machine_id=machine.id) }}" style="color: var(--sys-muted); text-decoration: none;">{{ machine.name }}</a>
    <span style="color: var(--sys-border);">/</span>
    <span style="color: var(--sys-ink); font-weight: 700;">Edit</span>
  </nav>

  <div class="sys-card">
    <div class="mech-card-header">
      <span>Edit Machine Node // {{ machine.machine_code }}</span>
      <span class="unit-dot"></span>
    </div>

    <form method="POST" style="padding: 1.5rem; background: #ffffff;">
      
      <!-- Name and Code -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Machine Name <span style="color: var(--sys-red);">*</span></label>
          <input type="text" name="name" required value="{{ machine.name }}" class="mech-input">
        </div>
        <div class="mech-field">
          <label>Machine Code <span style="color: var(--sys-red);">*</span></label>
          <input type="text" name="machine_code" required value="{{ machine.machine_code }}" class="mech-input" style="text-transform: uppercase;">
        </div>
      </div>

      <!-- Category and Manufacturer -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Category</label>
          <input type="text" name="category" value="{{ machine.category or '' }}" class="mech-input">
        </div>
        <div class="mech-field">
          <label>Manufacturer</label>
          <input type="text" name="manufacturer" value="{{ machine.manufacturer or '' }}" class="mech-input">
        </div>
      </div>

      <!-- Model and Serial -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Model Number</label>
          <input type="text" name="model_number" value="{{ machine.model_number or '' }}" class="mech-input">
        </div>
        <div class="mech-field">
          <label>Serial Number</label>
          <input type="text" name="serial_number" value="{{ machine.serial_number or '' }}" class="mech-input" style="font-family: 'Space Mono', monospace;">
        </div>
      </div>

      <!-- Purchase Date and Location -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Purchase Date</label>
          <input type="date" name="purchase_date"
            value="{{ machine.purchase_date.strftime('%Y-%m-%d') if machine.purchase_date else '' }}"
            class="mech-input">
        </div>
        <div class="mech-field">
          <label>Location / Bay</label>
          <input type="text" name="location" value="{{ machine.location or '' }}" class="mech-input">
        </div>
      </div>

      <!-- Status selection -->
      <div class="mech-field">
        <label>Operational Status <span style="color: var(--sys-red);">*</span></label>
        <select name="status" class="mech-select">
          {% for s in ['Operational', 'Under Maintenance', 'Decommissioned'] %}
          <option value="{{ s }}" {% if machine.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Notes -->
      <div class="mech-field">
        <label>Notes</label>
        <textarea name="notes" rows="3" class="mech-textarea">{{ machine.notes or '' }}</textarea>
      </div>

      <!-- Form Actions -->
      <div class="mech-btn-row" style="border-top: 1px solid var(--sys-border); padding-top: 1rem; margin-top: 1.5rem;">
        <a href="{{ url_for('spindlemech.machine_detail', machine_id=machine.id) }}" class="sys-btn" style="padding: 0.45rem 1rem; font-size: 0.6rem;">
          Cancel
        </a>
        <button type="submit" class="sys-btn sys-btn-primary" style="padding: 0.45rem 1.25rem; font-size: 0.6rem;">
          Update Machine
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
