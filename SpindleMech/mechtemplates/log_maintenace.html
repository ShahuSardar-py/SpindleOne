{% extends "mech_base.html" %}
{% block title %}Log Maintenance – SpindleMech{% endblock %}

{% block mech_content %}
<div style="max-width: 600px; margin: 0 auto;">

  <!-- Breadcrumb -->
  <nav style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase;">
    <a href="{{ url_for('spindlemech.index') }}" style="color: var(--sys-muted); text-decoration: none;">SpindleMech</a>
    <span style="color: var(--sys-border);">/</span>
    <span style="color: var(--sys-ink); font-weight: 700;">Log Maintenance</span>
  </nav>

  <div class="sys-card">
    <div class="mech-card-header">
      <span>Log Maintenance Record</span>
      <span class="unit-dot"></span>
    </div>

    {% if machines %}
    <form method="POST" style="padding: 1.5rem; background: #ffffff;">

      <!-- Machine selector -->
      <div class="mech-field">
        <label>Machine Node <span style="color: var(--sys-red);">*</span></label>
        <select name="machine_id" required class="mech-select">
          <option value="" disabled {% if not preselect %}selected{% endif %}>— Select machine node —</option>
          {% for m in machines %}
          <option value="{{ m.id }}" {% if preselect == m.id %}selected{% endif %}>
            {{ m.machine_code }} — {{ m.name }}{% if m.location %} ({{ m.location }}){% endif %}
          </option>
          {% endfor %}
        </select>
      </div>

      <!-- Type + Date -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Maintenance Type <span style="color: var(--sys-red);">*</span></label>
          <select name="maintenance_type" required class="mech-select">
            <option value="Preventive">Preventive</option>
            <option value="Corrective">Corrective</option>
            <option value="Inspection">Inspection</option>
          </select>
        </div>
        <div class="mech-field">
          <label>Date Performed <span style="color: var(--sys-red);">*</span></label>
          <input type="date" name="performed_on" required value="{{ today }}" class="mech-input">
        </div>
      </div>

      <!-- Performed by + Next due -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Performed By</label>
          <input type="text" name="performed_by" placeholder="Technician / vendor name" class="mech-input">
        </div>
        <div class="mech-field">
          <label>Next Due Date</label>
          <input type="date" name="next_due" class="mech-input">
        </div>
      </div>

      <!-- Cost + Downtime -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="mech-field">
          <label>Cost (₹)</label>
          <input type="number" name="cost" step="0.01" min="0" placeholder="0.00" class="mech-input">
        </div>
        <div class="mech-field">
          <label>Downtime (hours)</label>
          <input type="number" name="downtime_hours" step="0.5" min="0" placeholder="0" class="mech-input">
        </div>
      </div>

      <!-- Description -->
      <div class="mech-field">
        <label>Description <span style="color: var(--sys-red);">*</span></label>
        <textarea name="description" rows="3" required placeholder="Describe the work performed, observations, issues found…" class="mech-textarea"></textarea>
      </div>

      <!-- Parts replaced -->
      <div class="mech-field">
        <label>Parts Replaced</label>
        <input type="text" name="parts_replaced" placeholder="e.g. Bearing #6205, V-belt A42, Oil filter" class="mech-input">
      </div>

      <!-- Form Actions -->
      <div class="mech-btn-row" style="border-top: 1px solid var(--sys-border); padding-top: 1rem; margin-top: 1.5rem;">
        <a href="{{ url_for('spindlemech.index') }}" class="sys-btn" style="padding: 0.45rem 1rem; font-size: 0.6rem;">
          Cancel
        </a>
        <button type="submit" class="sys-btn sys-btn-primary" style="padding: 0.45rem 1.25rem; font-size: 0.6rem;">
          Save Record
        </button>
      </div>

    </form>
    {% else %}
    <div style="padding: 3rem; text-align: center; font-family: 'Space Mono', monospace; color: var(--sys-muted); background: #ffffff;">
      <p style="margin-bottom: 1.5rem;">No machines in the system yet. Add a machine first.</p>
      <a href="{{ url_for('spindlemech.add_machine') }}" class="sys-btn sys-btn-primary">Add Machine</a>
    </div>
    {% endif %}

  </div>
</div>
{% endblock %}
